<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Engine Kinematics & Thermo Simulator v4.6</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --panel-width: 300px;
            --accent: #00bcff;
            --yellow: #fffa65;
            --green: #2ed573;
            --blue: #3498db;
            --white: #ffffff;
        }

        body {
            margin: 0;
            display: flex;
            height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            background: #0f0f0f;
            color: #fff;
            overflow: hidden;
        }

        .sidebar {
            width: var(--panel-width);
            background: #1a1a1a;
            padding: 20px;
            z-index: 100;
            box-shadow: 2px 0 10px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
        }

        h3 {
            color: var(--accent);
            margin-top: 0;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
            font-size: 1.1rem;
        }

        .input-group {
            background: #252525;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 5px;
        }

        input[type="number"] {
            width: 60px;
            background: #333;
            border: 1px solid #444;
            color: #fff;
            border-radius: 4px;
            padding: 3px;
        }

        .signature {
            margin-top: auto;
            padding-top: 20px;
            font-size: 0.8rem;
            color: var(--white);
            text-align: left;
            line-height: 1.5;
            border-top: 1px solid #444;
        }

        .main-view {
            flex-grow: 1;
            position: relative;
            overflow: hidden;
            background: radial-gradient(circle, #1a1a1a 0%, #0a0a0a 100%);
        }

        canvas#engineCanvas {
            width: 100%;
            height: 100%;
            cursor: grab;
        }

        .zoom-controls {
            position: absolute;
            bottom: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 5px;
            z-index: 101;
        }

        .zoom-btn {
            width: 40px;
            height: 40px;
            background: #333;
            border: 1px solid #555;
            color: white;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1.2rem;
        }

        .window {
            position: absolute;
            background: rgba(20, 20, 20, 0.9);
            border: 1px solid #444;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            z-index: 50;
            resize: both;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .window-header {
            background: #333;
            padding: 6px 12px;
            cursor: move;
            font-size: 0.8rem;
            font-weight: bold;
            color: #ddd;
            display: flex;
            justify-content: space-between;
        }

        .chart-container {
            flex-grow: 1;
            padding: 5px;
            min-height: 0;
        }

        .checkbox-label {
            font-size: 0.8rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            color: #aaa;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h3>엔진 시뮬레이터 v4.6</h3>
        <div class="input-group">
            <div class="row"><label>보어 (D, mm)</label><input type="number" id="in-bore" value="86" oninput="update()"></div>
            <div class="row"><label>간극체적 (Vc, cc)</label><input type="number" id="in-vc" value="50" oninput="update()"></div>
            <label class="checkbox-label"><input type="checkbox" id="check-const" onchange="update()"> 보어/간극 상수 취급 (C)</label>
        </div>
        <div class="input-group">
            <div class="row"><label>크랭크 반지름 (r)</label><input type="number" id="in-crank" value="43" oninput="update()"></div>
            <div class="row"><label>커넥팅 로드 (l)</label><input type="number" id="in-conrod" value="150" oninput="update()"></div>
        </div>
        <div class="input-group">
            <div class="row"><label>크랭크 각도 (θ)</label><input type="number" id="in-theta-num" value="0" oninput="syncTheta('num')"></div>
            <input type="range" id="in-theta-range" style="width:100%" min="0" max="360" value="0" oninput="syncTheta('range')">
            <label class="checkbox-label" style="margin-top:10px; color: var(--accent);">
                <input type="checkbox" id="check-4stroke" onchange="toggle4Stroke()"> 4행정 보기 (0~720°)
            </label>
        </div>
        <div class="signature">
            <strong>Made by Keunju Bang (CNU)</strong><br>
            Copyleft (All rights reversed)
        </div>
    </div>

    <div class="main-view" id="viewport">
        <canvas id="engineCanvas"></canvas>
        <div class="zoom-controls">
            <button class="zoom-btn" onclick="adjustZoom(1.1)">+</button>
            <button class="zoom-btn" onclick="adjustZoom(0.9)">-</button>
            <button class="zoom-btn" onclick="resetView()" style="font-size:0.6rem">Reset</button>
        </div>

        <div id="win-l" class="window" style="top:20px; left:20px; width:300px; height:180px;"><div class="window-header" style="color:var(--yellow)">L (중심-핀 거리) <span>:::</span></div><div class="chart-container"><canvas id="chartL"></canvas></div></div>
        <div id="win-lp" class="window" style="top:210px; left:20px; width:300px; height:180px;"><div class="window-header" style="color:var(--green)">L' (상사점 거리) <span>:::</span></div><div class="chart-container"><canvas id="chartLP"></canvas></div></div>
        <div id="win-v" class="window" style="top:400px; left:20px; width:300px; height:180px;"><div class="window-header" style="color:var(--blue)">실린더 체적 (V) <span>:::</span></div><div class="chart-container"><canvas id="chartV"></canvas></div></div>

        <div id="win-pv" class="window" style="top:20px; right:20px; width:350px; height:280px; border: 1px solid var(--accent);">
            <div class="window-header" style="color:var(--accent)">P-V Diagram (Thermo Cycle) <span>:::</span></div>
            <div class="chart-container"><canvas id="chartPV"></canvas></div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('engineCanvas');
        const ctx = canvas.getContext('2d');
        let charts = {};
        let camera = { x: 50, y: 150, zoom: 0.8 };
        let isDragging = false, lastMousePos = { x: 0, y: 0 };

        canvas.onmousedown = (e) => { isDragging = true; lastMousePos = { x: e.clientX, y: e.clientY }; };
        window.onmousemove = (e) => {
            if (!isDragging) return;
            camera.x += (e.clientX - lastMousePos.x) / camera.zoom;
            camera.y += (e.clientY - lastMousePos.y) / camera.zoom;
            lastMousePos = { x: e.clientX, y: e.clientY }; update();
        };
        window.onmouseup = () => isDragging = false;
        function adjustZoom(f) { camera.zoom *= f; update(); }
        function resetView() { camera = { x: 50, y: 150, zoom: 0.8 }; update(); }

        function makeDraggable(el) {
            let p1 = 0, p2 = 0, p3 = 0, p4 = 0;
            const h = el.querySelector('.window-header');
            h.onmousedown = (e) => {
                p3 = e.clientX; p4 = e.clientY;
                document.onmouseup = () => { document.onmouseup = null; document.onmousemove = null; };
                document.onmousemove = (e) => {
                    p1 = p3 - e.clientX; p2 = p4 - e.clientY; p3 = e.clientX; p4 = e.clientY;
                    el.style.top = (el.offsetTop - p2) + "px"; el.style.left = (el.offsetLeft - p1) + "px";
                };
            };
        }
        document.querySelectorAll('.window').forEach(makeDraggable);

        function toggle4Stroke() {
            document.getElementById('in-theta-range').max = document.getElementById('check-4stroke').checked ? 720 : 360;
            if (charts.L) { Object.values(charts).forEach(c => c.destroy()); charts = {}; }
            update();
        }

        function syncTheta(s) {
            const n = document.getElementById('in-theta-num'), r = document.getElementById('in-theta-range');
            if (s === 'num') r.value = n.value; else n.value = r.value; update();
        }

        function update() {
            const isC = document.getElementById('check-const').checked, is4S = document.getElementById('check-4stroke').checked;
            const D = parseFloat(document.getElementById('in-bore').value) || 86, r = parseFloat(document.getElementById('in-crank').value) || 43;
            const l = parseFloat(document.getElementById('in-conrod').value) || 150, Vc = parseFloat(document.getElementById('in-vc').value) || 50;
            const deg = parseFloat(document.getElementById('in-theta-range').value) || 0, rad = deg * Math.PI / 180;
            const L_max = r + l, L = r * Math.cos(rad) + Math.sqrt(l ** 2 - (r * Math.sin(rad)) ** 2), LP = L_max - L;

            draw(D, r, l, rad, L, LP, L_max);
            updateCharts(r, l, deg, isC, is4S, D, Vc, L_max, L, LP);
        }

        function draw(D, r, l, rad, L, LP, L_max) {
            canvas.width = canvas.parentElement.clientWidth; canvas.height = canvas.parentElement.clientHeight;
            ctx.clearRect(0, 0, canvas.width, canvas.height); ctx.save();
            ctx.translate(canvas.width / 2 + camera.x * camera.zoom, canvas.height / 2 + camera.y * camera.zoom);
            ctx.scale(camera.zoom, camera.zoom);
            const pinX = r * Math.sin(rad), pinY = -r * Math.cos(rad), pY = -L, tdcY = -L_max;
            ctx.strokeStyle = "#444"; ctx.strokeRect(-D / 2, tdcY - 20, D, L_max + 50);
            ctx.fillStyle = "#888";[-D / 4, D / 4].forEach(x => { ctx.fillRect(x - 2, tdcY - 35, 4, 15); ctx.fillRect(x - 10, tdcY - 23, 20, 4); });
            ctx.setLineDash([5, 5]); ctx.strokeStyle = "#fffa65"; ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(0, pY); ctx.stroke();
            ctx.strokeStyle = "#3498db"; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(0, tdcY); ctx.lineTo(0, pY); ctx.stroke();
            ctx.setLineDash([]);
            ctx.strokeStyle = "#ff4757"; ctx.lineWidth = 5; ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(pinX, pinY); ctx.stroke();
            ctx.strokeStyle = "#2ed573"; ctx.lineWidth = 3; ctx.beginPath(); ctx.moveTo(pinX, pinY); ctx.lineTo(0, pY); ctx.stroke();
            ctx.fillStyle = "rgba(100,100,100,0.8)"; ctx.fillRect(-D / 2 + 2, pY - 15, D - 4, 30);
            ctx.restore();
        }

        function initChart(id, color, maxDeg, yLabel, isPV = false) {
            return new Chart(document.getElementById(id).getContext('2d'), {
                type: 'scatter',
                data: { datasets: [{ borderColor: color, showLine: true, pointRadius: 0, tension: 0.1, data: [] }, { backgroundColor: 'red', pointRadius: 5, showLine: false, data: [] }] },
                options: {
                    maintainAspectRatio: false, animation: false, parsing: false,
                    scales: {
                        x: { type: 'linear', title: { display: true, text: isPV ? 'Volume' : 'Angle', font: { size: 10 } } },
                        y: { min: 0, title: { display: true, text: yLabel, font: { size: 10 } } }
                    }, plugins: { legend: { display: false } }
                }
            });
        }

        function updateCharts(r, l, deg, isC, is4S, D, Vc, L_max, curL, curLP) {
            const dL = [], dLP = [], dV = [], dPV = [], gamma = 1.35, P_atm = 1.0, area = Math.PI * (D / 2) ** 2;
            const maxDeg = is4S ? 720 : 360;
            const V_max = isC ? (L_max + Vc) : (area * L_max / 1000000 + Vc / 1000);
            const V_min = isC ? Vc : Vc / 1000;

            // 핵심 해결책: 압축에 의한 최대 압력을 먼저 구하고, 폭발 압력을 그 위로 강제 설정
            const P_comp_max = P_atm * Math.pow(V_max / V_min, gamma);
            const P_peak = P_comp_max * 3.5; // 폭발하면 압축 최대 압력의 3.5배가 된다고 가정 (무조건 팽창이 위로 감!)

            for (let i = 0; i <= maxDeg; i += (is4S ? 5 : 2)) {
                const rad_i = i * Math.PI / 180, lp_v = L_max - (r * Math.cos(rad_i) + Math.sqrt(l ** 2 - (r * Math.sin(rad_i)) ** 2));
                const v_i = isC ? (lp_v + Vc) : (area * lp_v / 1000000 + Vc / 1000);
                let p_i = P_atm;

                if (is4S) {
                    if (i <= 180) p_i = P_atm; // Intake (1행정)
                    else if (i <= 360) p_i = P_atm * Math.pow(V_max / v_i, gamma); // Compression (2행정 - 아랫쪽 저압 곡선)
                    else if (i <= 540) p_i = P_peak * Math.pow(V_min / v_i, gamma); // Power (3행정 - 윗쪽 고압 곡선)
                    else p_i = P_atm + 0.1; // Exhaust (4행정)
                } else {
                    // 2행정 시계방향 오토 사이클
                    if (i <= 180) p_i = P_peak * Math.pow(V_min / v_i, gamma); // 팽창 (윗 곡선)
                    else p_i = P_atm * Math.pow(V_max / v_i, gamma); // 압축 (아랫 곡선)
                }

                dL.push({ x: i, y: L_max - lp_v });
                dLP.push({ x: i, y: lp_v });
                dV.push({ x: i, y: v_i });
                dPV.push({ x: v_i, y: p_i });
            }

            // 그래프 닫기 처리 (수직 정적분합성선)
            if (!is4S) { dPV.push({ x: V_min, y: P_peak }); } // 2행정 마지막에 폭발 수직선 그리기
            else { dPV.push({ x: V_min, y: P_atm }); } // 4행정 마지막에 흡입 초기점으로 수직선 그리기

            if (!charts.L) {
                charts.L = initChart('chartL', '#fffa65', maxDeg, "L [mm]");
                charts.LP = initChart('chartLP', '#2ed573', maxDeg, "L' [mm]");
                charts.V = initChart('chartV', '#3498db', maxDeg, isC ? "Vol [C]" : "Vol [L]");
                charts.PV = initChart('chartPV', '#00bcff', V_max * 1.1, "Pres [Bar]", true);
                charts.PV.options.scales.x.min = V_min * 0.8;
                charts.PV.options.scales.x.max = V_max * 1.1;
            }

            charts.L.options.scales.x.max = maxDeg; charts.L.options.scales.y.max = L_max * 1.1;
            charts.LP.options.scales.x.max = maxDeg; charts.LP.options.scales.y.max = (L_max - (L_max - 2 * r)) * 1.1;
            charts.V.options.scales.x.max = maxDeg; charts.V.options.scales.y.max = V_max * 1.1;
            charts.PV.options.scales.y.max = P_peak * 1.1; // 스케일을 최대 폭발압력 기준으로 고정

            const curV = isC ? (curLP + Vc) : (area * curLP / 1000000 + Vc / 1000);
            let curP = P_atm;
            if (is4S) {
                if (deg <= 180) curP = P_atm;
                else if (deg <= 360) curP = P_atm * Math.pow(V_max / curV, gamma);
                else if (deg <= 540) curP = P_peak * Math.pow(V_min / curV, gamma);
                else curP = P_atm + 0.1;
            } else {
                if (deg <= 180) curP = P_peak * Math.pow(V_min / curV, gamma);
                else curP = P_atm * Math.pow(V_max / curV, gamma);
            }

            charts.L.data.datasets[0].data = dL; charts.L.data.datasets[1].data = [{ x: deg, y: curL }];
            charts.LP.data.datasets[0].data = dLP; charts.LP.data.datasets[1].data = [{ x: deg, y: curLP }];
            charts.V.data.datasets[0].data = dV; charts.V.data.datasets[1].data = [{ x: deg, y: curV }];
            charts.PV.data.datasets[0].data = dPV; charts.PV.data.datasets[1].data = [{ x: curV, y: curP }];

            charts.L.update('none'); charts.LP.update('none'); charts.V.update('none'); charts.PV.update('none');
        }
        update();
    </script>
</body>
</html>
